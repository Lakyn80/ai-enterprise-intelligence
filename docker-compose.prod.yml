networks:
  app_net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - app_net
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retail_forecast
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - app_net
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/lakyn80/ai-enterprise-intelligence-backend:latest
    networks:
      - app_net
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/retail_forecast
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/retail_forecast
      REDIS_URL: redis://redis:6379/0
      artifacts_path: /app/artifacts
      RAG_CHROMA_PATH: /app/chroma_db
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/artifacts
      - chroma_data:/app/chroma_db
      - ./data:/data

  frontend:
    image: ghcr.io/lakyn80/ai-enterprise-intelligence-frontend:latest
    networks:
      - app_net
    ports:
      - "3030:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  model_artifacts:
  chroma_data:
