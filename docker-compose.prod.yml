networks:
  app_net:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - app_net
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retail_forecast
    # no external port — only accessible within app_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - app_net
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --appendonly yes
    # no external port — only accessible within app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.4
    networks:
      - app_net
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # The official Qdrant image is intentionally slim and does not ship curl/wget.
      # A simple PID 1 liveness check is enough for Compose dependency gating here.
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    image: ghcr.io/lakyn80/ai-enterprise-intelligence-backend:latest
    networks:
      - app_net
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/retail_forecast
      DATABASE_URL_SYNC: postgresql://postgres:postgres@postgres:5432/retail_forecast
      REDIS_URL: redis://redis:6379/0
      VECTORSTORE: qdrant
      ASSISTANTS_SEMANTIC_CACHE_BACKEND: qdrant
      QDRANT_URL: http://qdrant:6333
      artifacts_path: /app/artifacts
      RAG_CHROMA_PATH: /app/chroma_db
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - model_artifacts:/app/artifacts
      - chroma_data:/app/chroma_db
      - ./data:/data

  frontend:
    image: ghcr.io/lakyn80/ai-enterprise-intelligence-frontend:latest
    networks:
      - app_net
    ports:
      - "4000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
  model_artifacts:
  chroma_data:
  qdrant_data:
  redis_data:
