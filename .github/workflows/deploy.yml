name: Deploy to Server

on:
  workflow_run:
    workflows:
      - "Build & Push Frontend"
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Wait for backend image build for same commit
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            for (let attempt = 1; attempt <= 40; attempt++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "backend.yml",
                head_sha: headSha,
                per_page: 10,
              });

              const run = data.workflow_runs.find(
                (item) => item.name === "Build & Push Backend",
              );

              if (run?.conclusion === "success") {
                core.info(`Backend workflow succeeded for ${headSha}.`);
                return;
              }

              if (run?.status === "completed") {
                core.setFailed(
                  `Backend workflow finished with conclusion '${run.conclusion}' for ${headSha}.`,
                );
                return;
              }

              core.info(
                `Backend workflow for ${headSha} is not finished yet (attempt ${attempt}/40).`,
              );
              await sleep(15000);
            }

            core.setFailed(
              `Timed out waiting for backend workflow success for ${headSha}.`,
            );

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/projects/apps/ai-enterprise-intelligence
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            sleep 10
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            docker compose -f docker-compose.prod.yml exec -T backend python -m scripts.warm_preset_cache
